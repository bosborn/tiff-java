name: Java CI

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - name: Set up JDK 1.8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8
    - shell: bash
      run: |
        echo "::set-env name=TEMP::mvn help:evaluate -Dexpression=project.version -q -DforceStdout"
        echo $TEMP
        mvn help:evaluate -Dexpression=project.version -q -DforceStdout > VERSION
    - name: Build with Maven
      run: mvn -B package --file pom.xml
    - name: Upload JAR
      uses: actions/upload-artifact@v1
      with:
        name: tiff-${VERSION}.jar
        path: target/tiff-${VERSION}.jar
